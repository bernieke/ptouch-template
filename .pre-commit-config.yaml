repos:
  - repo: local
    hooks:
      - id: tests
        name: Run tests
        entry: ./tests/test_ptouch_template.py
        language: system
        types: [python]
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
